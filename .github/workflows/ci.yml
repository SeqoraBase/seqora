name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: forge test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Format check
        working-directory: contracts
        run: forge fmt --check

      - name: Build
        working-directory: contracts
        run: forge build --sizes

      - name: Test
        working-directory: contracts
        run: forge test -vv

      - name: Storage layout drift
        working-directory: contracts
        # Fail if any upgradeable-contract storage layout has shifted from the committed
        # baseline. Regenerate locally with `make storage` and commit the diff.
        run: |
          set -euo pipefail
          mkdir -p .tmp-storage
          failed=0
          for name in LicenseRegistry BiosafetyCourt ProvenanceRegistry; do
            forge inspect "$name" storageLayout --json > ".tmp-storage/${name}.json"
            if ! diff -u "storage/${name}.json" ".tmp-storage/${name}.json"; then
              echo "::error::Storage layout drift detected in ${name}. Regenerate with 'make storage' and commit."
              failed=1
            fi
          done
          rm -rf .tmp-storage
          exit $failed

      - name: Gas snapshot check
        working-directory: contracts
        # `--check` exits non-zero if any gas cost differs from the committed .gas-snapshot.
        # Regenerate locally with `make snapshot` and commit the diff when intentional.
        run: forge snapshot --check --snap .gas-snapshot

  coverage:
    name: coverage (>=80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Coverage report
        working-directory: contracts
        run: |
          set -euo pipefail
          forge coverage --ir-minimum --no-match-coverage "(test|script)" --report summary | tee coverage-summary.txt
          LINE_COV=$(grep "^| Total" coverage-summary.txt | awk -F'|' '{print $3}' | grep -oP '[\d.]+' | head -1)
          echo "Line coverage: ${LINE_COV}%"
          # Hard gate at 80%. Current baseline on main is ~95% (see PR #15); drop here if the
          # floor ever genuinely needs to move.
          if [ "$(echo "$LINE_COV < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below the 80% threshold"
            exit 1
          fi

  abi-sync:
    name: ABI sync (frontend ↔ contracts/out)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build contracts
        working-directory: contracts
        run: forge build

      - name: Regenerate frontend ABIs
        run: node scripts/sync-abis.mjs

      - name: Fail on ABI drift
        # CI runs the sync script, then fails if the working tree is dirty. Committers must run
        # `node scripts/sync-abis.mjs` locally after any ABI-affecting change.
        run: |
          if [ -n "$(git status --porcelain frontend/src/lib/contracts)" ]; then
            echo "::error::frontend/src/lib/contracts/*Abi.ts is out of sync with contracts/out/. Run 'node scripts/sync-abis.mjs' and commit."
            git --no-pager diff -- frontend/src/lib/contracts
            exit 1
          fi

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Generate Next.js route types
        working-directory: frontend
        run: npx next typegen

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  synbiohub-ingest:
    name: synbiohub-ingest build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/synbiohub-ingest/package-lock.json

      - name: Install
        working-directory: tools/synbiohub-ingest
        run: npm ci

      - name: Typecheck
        working-directory: tools/synbiohub-ingest
        run: npm run typecheck

      - name: Build
        working-directory: tools/synbiohub-ingest
        run: npm run build

      - name: Test
        working-directory: tools/synbiohub-ingest
        run: npm test
