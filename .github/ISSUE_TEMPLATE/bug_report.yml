name: Bug Report
description: Report a bug in the Seqora protocol
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Deploy contract X
        2. Call function Y with args Z
        3. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Base Mainnet
        - Base Sepolia
        - Local (Anvil)
    validations:
      required: true
  - type: dropdown
    id: contract
    attributes:
      label: Contract
      options:
        - DesignRegistry
        - ScreeningAttestations
        - LicenseRegistry
        - RoyaltyRouter
        - ProvenanceRegistry
        - BiosafetyCourt
        - Frontend
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
